<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — LearnFast</title>
    <link rel="stylesheet" href="/frontend/css/global.css">
    <link rel="stylesheet" href="/frontend/css/pages.css">
    <style>
        .pending-count {
            background: #ff6b6b;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 999px;
            padding: 1px 7px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .mentor-application-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
        }
        .mentor-application-card h4 { margin: 0 0 0.25rem; font-size: 1.05rem; }
        .mentor-application-card .meta { font-size: 0.82rem; color: rgba(255,255,255,0.55); margin-bottom: 0.75rem; }
        .mentor-application-card .detail-row { font-size: 0.88rem; margin-bottom: 0.3rem; }
        .mentor-application-card .detail-row strong { color: rgba(255,255,255,0.75); }
        .mentor-application-card .actions { margin-top: 1rem; display: flex; gap: 0.6rem; }
    </style>
</head>
<body>
    <div class="bg-animated"></div>

    <nav class="navbar" id="navbar">
        <a href="/frontend/pages/index.html" class="navbar-brand">
            <span class="brand-icon">⚡</span> LearnFast
        </a>
        <div class="navbar-links" id="nav-links"></div>
    </nav>

    <div class="admin-layout">
        <div class="admin-sidebar">
            <button class="admin-nav-item active" onclick="showTab('subjects')" id="tab-subjects">
                📚 Subjects
            </button>
            <button class="admin-nav-item" onclick="showTab('users')" id="tab-users">
                👥 Users
            </button>
            <button class="admin-nav-item" onclick="showTab('pending')" id="tab-pending">
                ⏳ Pending Mentors <span id="pending-badge" class="pending-count" style="display:none;"></span>
            </button>
        </div>

        <div class="admin-content">
            <!-- Subjects Tab -->
            <div id="panel-subjects">
                <h2>📚 Manage Subjects</h2>
                <div class="admin-toolbar">
                    <div class="admin-form-inline">
                        <input type="text" class="form-control" id="new-subject-name" placeholder="New subject name...">
                        <button class="btn btn-primary" onclick="addSubject()">Add Subject</button>
                    </div>
                </div>
                <div id="alert-container"></div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="subjects-table-body">
                            <tr><td colspan="3" class="text-center text-muted" style="padding:2rem;">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pending Mentors Tab -->
            <div id="panel-pending" style="display:none;">
                <h2>⏳ Pending Mentor Applications</h2>
                <p class="text-muted" style="margin-bottom:1.5rem;">Review and approve or reject mentor registration requests.</p>
                <div id="pending-list"></div>
            </div>

            <!-- Users Tab -->
            <div id="panel-users" style="display:none;">
                <h2>👥 Manage Users</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="users-table-body">
                            <tr><td colspan="6" class="text-center text-muted" style="padding:2rem;">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/call-manager.js"></script>
    <script src="/frontend/js/admin.js"></script>
</body>
</html>
