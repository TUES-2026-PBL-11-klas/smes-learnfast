<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your LearnFast account.">
    <title>Log In — LearnFast</title>
    <link rel="stylesheet" href="/frontend/css/global.css">
    <link rel="stylesheet" href="/frontend/css/pages.css">
</head>
<body>
    <div class="bg-animated"></div>

    <nav class="navbar">
        <a href="/frontend/pages/index.html" class="navbar-brand">
            <span class="brand-icon">⚡</span> LearnFast
        </a>
    </nav>

    <div class="auth-page">
        <div class="glass-card auth-card">
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Log in to continue learning</p>

            <div id="alert-container"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" class="form-control" id="login-username" placeholder="Your username" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" class="form-control" id="login-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-full btn-lg">Log In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/frontend/pages/register.html">Sign up free</a>
            </div>
        </div>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/auth.js"></script>
</body>
</html>
