<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Call — LearnFast</title>
    <link rel="stylesheet" href="/frontend/css/global.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #111214;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .gc-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1.25rem;
            background: #18191c;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .gc-topbar-brand { font-weight: 700; font-size: 1rem; color: #7c6fff; }
        .gc-channel-name { font-size: 0.9rem; color: rgba(255,255,255,0.6); }
        .gc-status { font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 999px; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.55); }
        .gc-status.connected { background: rgba(34,197,94,0.15); color: #4ade80; }
        .gc-status.error { background: rgba(239,68,68,0.18); color: #f87171; }

        .gc-stage {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem;
            overflow: auto;
        }
        .gc-tile {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #1e1f22;
            border: 2px solid transparent;
            width: 320px;
            aspect-ratio: 16/9;
            flex-shrink: 0;
        }
        .gc-tile video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .gc-tile-label {
            position: absolute;
            bottom: 0.5rem;
            left: 0.75rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border-radius: 6px;
            padding: 0.15rem 0.5rem;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .gc-avatar-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 700;
            background: linear-gradient(135deg, #5865f2, #7c6fff);
        }

        .gc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.85rem 1.25rem;
            background: #18191c;
            border-top: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .vc-btn {
            width: 52px; height: 52px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            background: #2b2d31;
            color: #fff;
            transition: background 0.15s, transform 0.1s;
        }
        .vc-btn:hover { background: #3a3c42; transform: scale(1.05); }
        .vc-btn.off { background: rgba(239,68,68,0.2); color: #f87171; }
        .vc-btn-end { background: #ed4245; width: 60px; height: 60px; font-size: 1.4rem; }
        .vc-btn-end:hover { background: #c03537; }
        .vc-btn-wrap { display: flex; flex-direction: column; align-items: center; }
        .vc-btn-label { font-size: 0.65rem; color: rgba(255,255,255,0.45); margin-top: 0.2rem; text-align: center; }
        .vc-btn.sharing { background: rgba(99,102,241,0.3); color: #818cf8; outline: 2px solid #6366f1; }
        .vc-btn.sharing:hover { background: rgba(99,102,241,0.45); }
    </style>
</head>
<body>
    <div class="gc-topbar">
        <span class="gc-topbar-brand">⚡ LearnFast</span>
        <span class="gc-channel-name" id="gc-channel-name">Group Call</span>
        <span class="gc-status" id="gc-status">Connecting…</span>
    </div>

    <div class="gc-stage" id="gc-stage">
        <!-- local tile inserted by JS -->
    </div>

    <div class="gc-controls">
        <div class="vc-btn-wrap">
            <button class="vc-btn" id="btn-mic" onclick="gcToggleMic()" title="Mic">🎤</button>
            <div class="vc-btn-label">Mic</div>
        </div>
        <div class="vc-btn-wrap">
            <button class="vc-btn" id="btn-cam" onclick="gcToggleCam()" title="Camera">📷</button>
            <div class="vc-btn-label">Camera</div>
        </div>
        <div class="vc-btn-wrap">
            <button class="vc-btn" id="btn-screen" onclick="gcToggleScreenShare()" title="Share screen">🖥️</button>
            <div class="vc-btn-label">Screen</div>
        </div>
        <div class="vc-btn-wrap">
            <button class="vc-btn-end vc-btn" onclick="gcLeave()" title="Leave">📞</button>
            <div class="vc-btn-label" style="color:#f87171;">Leave</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/group-call.js"></script>
</body>
</html>
