<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your LearnFast account and start learning with expert mentors.">
    <title>Sign Up — LearnFast</title>
    <link rel="stylesheet" href="/frontend/css/global.css">
    <link rel="stylesheet" href="/frontend/css/pages.css">
    <style>
        .mentor-section-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--primary, #7c6fff);
            margin: 1.2rem 0 0.8rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid rgba(124,111,255,0.25);
        }
        .required { color: #ff6b6b; margin-left: 2px; }
    </style>
</head>
<body>
    <div class="bg-animated"></div>

    <nav class="navbar">
        <a href="/frontend/pages/index.html" class="navbar-brand">
            <span class="brand-icon">⚡</span> LearnFast
        </a>
    </nav>

    <div class="auth-page">
        <div class="glass-card auth-card">
            <h2>Create Account</h2>
            <p class="auth-subtitle">Join LearnFast and start your journey</p>

            <div id="alert-container"></div>

            <form id="register-form">
                <div class="form-group">
                    <label>I want to be a...</label>
                    <div class="role-selector">
                        <div class="role-option selected" data-role="student" id="role-student" onclick="selectRole('student')">
                            <div class="role-icon">👨‍🎓</div>
                            <div class="role-name">Student</div>
                        </div>
                        <div class="role-option" data-role="mentor" id="role-mentor" onclick="selectRole('mentor')">
                            <div class="role-icon">👨‍🏫</div>
                            <div class="role-name">Mentor</div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" class="form-control" id="reg-name" placeholder="John Smith" required>
                </div>

                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" class="form-control" id="reg-username" placeholder="johnsmith" required>
                </div>

                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" class="form-control" id="reg-email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="reg-age">Age</label>
                    <input type="number" class="form-control" id="reg-age" placeholder="18" min="10" max="100" required>
                </div>

                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" class="form-control" id="reg-password" placeholder="••••••••" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="reg-bio">Bio (optional)</label>
                    <textarea class="form-control" id="reg-bio" placeholder="Tell us about yourself..." rows="3"></textarea>
                </div>

                <!-- Mentor-only fields -->
                <div id="mentor-fields" style="display:none;">
                    <div class="mentor-section-label">Mentor Application</div>

                    <div class="form-group">
                        <label for="reg-diploma">Diploma / Qualification <span class="required">*</span></label>
                        <input type="text" class="form-control" id="reg-diploma"
                               placeholder="e.g. MSc Computer Science, Sofia University">
                    </div>

                    <div class="form-group">
                        <label for="reg-years">Years of teaching experience <span class="required">*</span></label>
                        <input type="number" class="form-control" id="reg-years"
                               placeholder="0" min="0" max="50" oninput="toggleExperienceFields()">
                    </div>

                    <div class="form-group" id="field-of-expertise-group" style="display:none;">
                        <label for="reg-field">Field of expertise <span class="required">*</span></label>
                        <input type="text" class="form-control" id="reg-field"
                               placeholder="e.g. Web Development, Mathematics, Physics">
                    </div>

                    <div class="form-group" id="motivation-group" style="display:none;">
                        <label for="reg-motivation">Why do you want to start teaching at LearnFast? <span class="required">*</span></label>
                        <textarea class="form-control" id="reg-motivation"
                                  placeholder="Tell us about your passion for teaching and what you can offer to students..." rows="3"></textarea>
                    </div>
                </div>

                <input type="hidden" id="reg-role" value="student">

                <button type="submit" class="btn btn-primary w-full btn-lg">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/frontend/pages/login.html">Log in</a>
            </div>
        </div>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/auth.js"></script>
    <script>
        // Pre-select role from URL
        const params = new URLSearchParams(window.location.search);
        if (params.get('role') === 'mentor') selectRole('mentor');

        function toggleExperienceFields() {
            const years = parseInt(document.getElementById('reg-years').value) || 0;
            document.getElementById('field-of-expertise-group').style.display = years > 0 ? 'block' : 'none';
            document.getElementById('motivation-group').style.display = years === 0 ? 'block' : 'none';
        }
    </script>
</body>
</html>
