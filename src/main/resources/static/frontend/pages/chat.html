<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chat with mentors and students on LearnFast. Real-time messaging powered by WebSocket.">
    <title>Chat — LearnFast</title>
    <link rel="stylesheet" href="/frontend/css/global.css">
    <link rel="stylesheet" href="/frontend/css/pages.css">
    <style>
        .call-event-msg {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            padding: 0.4rem 0;
            margin: 0.2rem 0;
            text-align: center;
        }
        .chat-locked {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 0.75rem;
            text-align: center;
            color: rgba(255,255,255,0.6);
            padding: 2rem;
        }
        .chat-locked h4 { color: #fff; font-size: 1.1rem; margin: 0; }
        .chat-locked p  { font-size: 0.88rem; max-width: 280px; margin: 0; }
        .mt-2 { margin-top: 0.5rem; }
        .chat-attach-btn {
            padding: 0.4rem 0.6rem;
            font-size: 1rem;
            flex-shrink: 0;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.7);
        }
        .chat-attach-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .msg-image img {
            max-width: 260px;
            max-height: 320px;
            border-radius: 10px;
            display: block;
            cursor: pointer;
            object-fit: cover;
        }
        .msg-file a { color: #818cf8; text-decoration: none; }
        .msg-file a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="bg-animated"></div>

    <nav class="navbar" id="navbar">
        <a href="/frontend/pages/index.html" class="navbar-brand">
            <span class="brand-icon">⚡</span> LearnFast
        </a>
        <div class="navbar-links" id="nav-links"></div>
    </nav>

    <div id="alert-container" style="position:fixed;top:5rem;right:1.5rem;z-index:9999;width:320px;"></div>

    <div class="chat-layout">
        <!-- Sidebar -->
        <div class="chat-sidebar" id="chat-sidebar">
            <div class="chat-sidebar-header">
                <h3>💬 Messages</h3>
            </div>
            <div class="chat-list" id="chat-list">
                <div class="page-loader" style="min-height: 200px;">
                    <div class="loader"></div>
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-main" id="chat-main">
            <div class="chat-empty">
                <div class="empty-icon pulse-animation">💬</div>
                <h3>Select a conversation</h3>
                <p class="text-muted">Choose a contact from the sidebar to start chatting</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/call-manager.js"></script>
    <script src="/frontend/js/chat.js"></script>
</body>
</html>
