<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — LearnFast</title>
    <link rel="stylesheet" href="/frontend/css/global.css">
    <link rel="stylesheet" href="/frontend/css/pages.css">
</head>
<body>
    <div class="bg-animated"></div>

    <nav class="navbar" id="navbar">
        <a href="/frontend/pages/index.html" class="navbar-brand">
            <span class="brand-icon">⚡</span> LearnFast
        </a>
        <div class="navbar-links" id="nav-links"></div>
    </nav>

    <div class="page-content">
        <div class="container-sm" style="max-width: 700px;">
            <div id="alert-container"></div>
            
            <div class="glass-card profile-header" id="profile-header">
                <div class="page-loader">
                    <div class="loader loader-lg"></div>
                </div>
            </div>

            <div class="glass-card profile-bio mt-3" id="profile-bio" style="display:none;"></div>

            <!-- Reviews Section -->
            <div id="reviews-section" class="mt-4" style="display:none;">
                <h3>Reviews & Ratings</h3>
                <div id="review-form-container" class="glass-card mt-2 mb-3" style="display:none;">
                    <h4>Leave a Review</h4>
                    <form id="review-form">
                        <div class="form-group mb-1">
                            <label>Rating</label>
                            <div class="star-rating" id="review-stars-input">
                                <span class="star" data-val="1">★</span>
                                <span class="star" data-val="2">★</span>
                                <span class="star" data-val="3">★</span>
                                <span class="star" data-val="4">★</span>
                                <span class="star" data-val="5">★</span>
                            </div>
                            <input type="hidden" id="review-rating" value="0">
                        </div>
                        <div class="form-group mb-1">
                            <label>Comment</label>
                            <textarea id="review-comment" class="form-control" placeholder="What was your experience like?"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm">Submit Review</button>
                    </form>
                </div>

                <div id="reviews-list" class="mt-2"></div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-backdrop" id="edit-modal">
        <div class="modal">
            <button class="modal-close" onclick="closeEditModal()">×</button>
            <h2 class="mb-2">Edit Profile</h2>
            <form id="edit-profile-form">
                <div class="form-group">
                    <label>Avatar URL (optional)</label>
                    <input type="url" class="form-control" id="edit-avatar">
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" id="edit-name" required>
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <textarea class="form-control" id="edit-bio" rows="4"></textarea>
                </div>
                
                <div id="edit-subjects-container" style="display:none;" class="mb-3">
                    <label style="display:block;margin-bottom:0.5rem;font-weight:500;font-size:0.9rem;color:var(--text-secondary)">Teaching Subjects</label>
                    <div id="edit-subjects-list" class="flex gap-1" style="flex-wrap:wrap;"></div>
                </div>
                
                <button type="submit" class="btn btn-primary w-full">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/profile.js"></script>
</body>
</html>
