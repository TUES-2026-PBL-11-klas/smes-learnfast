<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnFast Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/profile.css">

</head>

<body>

<div class="profile-container">

<!-- LEFT SIDEBAR -->
<div class="profile-sidebar">

<div class="avatar">JD</div>

<h2 class="fullname">John Doe</h2>
<p class="username">@johndoe</p>

<span class="role mentor">Mentor</span>

<div class="info">
<p><strong>Age:</strong> 25</p>
<p><strong>Email:</strong> john@email.com</p>
</div>

</div>

<!-- RIGHT CONTENT -->
<div class="profile-main">

<h1>Profile Settings</h1>

<form>

<div class="form-row">
<label>Full Name</label>
<input type="text" value="John Doe">
</div>

<div class="form-row">
<label>Pronouns</label>
<select>
<option value="">Prefer not to say</option>
<option>He / Him</option>
<option>She / Her</option>
<option>They / Them</option>
<option>He / They</option>
<option>She / They</option>
</select>
</div>

<div class="form-row">
<label>Location</label>
<input type="text" placeholder="City, Country">
</div>

<div class="form-row">
<label>Local Time</label>
<select>
<option value="">Select your timezone</option>
<option>UTC−12:00</option>
<option>UTC−08:00 (Pacific Time)</option>
<option>UTC−05:00 (Eastern Time)</option>
<option>UTC+00:00 (GMT)</option>
<option>UTC+01:00 (Central Europe)</option>
<option>UTC+02:00 (Eastern Europe)</option>
<option>UTC+03:00</option>
<option>UTC+05:30 (India)</option>
<option>UTC+08:00 (China / Singapore)</option>
<option>UTC+09:00 (Japan / Korea)</option>
<option>UTC+10:00 (Australia)</option>
</select>
</div>

<div class="form-row">
<label>Bio</label>
<textarea placeholder="Tell something about yourself..."></textarea>
</div>

<button class="update-btn">Update Profile</button>

</form>

</div>

</div>

</body>
</html>
