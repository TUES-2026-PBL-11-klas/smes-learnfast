name: Java CI with Maven

on:
  push:
    branches: [ "main", "UI", "virtualization" ]
  pull_request:
    branches: [ "main", "UI", "virtualization" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Java
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      # Build + Test
      - name: Build and test with Maven
        run: mvn -B clean verify

      # Lint (Checkstyle)
      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            stefcho69/smes-learnfast:latest
            stefcho69/smes-learnfast:${{ github.sha }}

      - name: Update deployment image tag
        run: |
          sed -i "s|image: .*|image: stefcho69/smes-learnfast:${{ github.sha }}|" \
            learnfast-infra/k8s/base/deployment.yaml

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add learnfast-infra/k8s/base/deployment.yaml
          git commit -m "chore: update image to ${{ github.sha }}" || true
          git push

      # ── Discord: Success ─────────────────────────────────────────
      - name: Notify Discord — Success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "embeds": [{
                   "title": "✅ Build Passed",
                   "color": 3066993,
                   "fields": [
                     { "name": "Repo",    "value": "'"$GITHUB_REPOSITORY"'", "inline": true },
                     { "name": "Branch",  "value": "'"$GITHUB_REF_NAME"'",   "inline": true },
                     { "name": "Commit",  "value": "'"$GITHUB_SHA"'",        "inline": false },
                     { "name": "Trigger", "value": "'"$GITHUB_EVENT_NAME"'", "inline": true }
                   ],
                   "url": "'"https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"'"
                 }]
               }' \
               "$DISCORD_WEBHOOK_URL"

      # ── Discord: Failure ─────────────────────────────────────────
      - name: Notify Discord — Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "embeds": [{
                   "title": "❌ Build Failed",
                   "color": 15158332,
                   "fields": [
                     { "name": "Repo",    "value": "'"$GITHUB_REPOSITORY"'", "inline": true },
                     { "name": "Branch",  "value": "'"$GITHUB_REF_NAME"'",   "inline": true },
                     { "name": "Commit",  "value": "'"$GITHUB_SHA"'",        "inline": false },
                     { "name": "Trigger", "value": "'"$GITHUB_EVENT_NAME"'", "inline": true }
                   ],
                   "url": "'"https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"'"
                 }]
               }' \
               "$DISCORD_WEBHOOK_URL"
