name: Java CI with Maven

on:
  push:
    branches: [ "main", "UI", "virtualization" ]
  pull_request:
    branches: [ "main", "UI", "virtualization" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Java
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      # Build + Test
      - name: Build and test with Maven
        run: mvn -B clean verify

      # Lint (Checkstyle)
      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Show coverage report
        run: start target\site\jacoco\index.html

      # ── Discord: Success ─────────────────────────────────────────
      - name: Notify Discord — Success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "embeds": [{
                   "title": "✅ Build Passed",
                   "color": 3066993,
                   "fields": [
                     { "name": "Repo",    "value": "'"$GITHUB_REPOSITORY"'", "inline": true },
                     { "name": "Branch",  "value": "'"$GITHUB_REF_NAME"'",   "inline": true },
                     { "name": "Commit",  "value": "'"$GITHUB_SHA"'",        "inline": false },
                     { "name": "Trigger", "value": "'"$GITHUB_EVENT_NAME"'", "inline": true }
                   ],
                   "url": "'"https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"'"
                 }]
               }' \
               "$DISCORD_WEBHOOK_URL"

      # ── Discord: Failure ─────────────────────────────────────────
      - name: Notify Discord — Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "embeds": [{
                   "title": "❌ Build Failed",
                   "color": 15158332,
                   "fields": [
                     { "name": "Repo",    "value": "'"$GITHUB_REPOSITORY"'", "inline": true },
                     { "name": "Branch",  "value": "'"$GITHUB_REF_NAME"'",   "inline": true },
                     { "name": "Commit",  "value": "'"$GITHUB_SHA"'",        "inline": false },
                     { "name": "Trigger", "value": "'"$GITHUB_EVENT_NAME"'", "inline": true }
                   ],
                   "url": "'"https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"'"
                 }]
               }' \
               "$DISCORD_WEBHOOK_URL"
