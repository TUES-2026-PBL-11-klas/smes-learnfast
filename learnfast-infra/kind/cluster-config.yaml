# Kind cluster configuration for LearnFast
# Usage: kind create cluster --config cluster-config.yaml --name learnfast
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # App accessible at localhost:30080
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # ArgoCD UI at localhost:30443
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
  - role: worker
